version: '3.8'

services:
  backend:
    build: .
    command: node api/server.js
    ports:
      - "5000:5000"
    env_file:
      - api/.env
    restart: always

  frontend:
    build: .
    command: node serve.js
    ports:
      - "3300:3300"
    environment:
      - PORT=3300
    restart: always
